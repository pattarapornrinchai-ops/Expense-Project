<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ระบบบันทึกค่าใช้จ่ายโครงการ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f7f6f2}
body{font-family:'Sarabun',sans-serif;-webkit-font-smoothing:antialiased;color:#1a1a2e}
#root{height:100%}
input,select,textarea{font-family:'Sarabun',sans-serif}
input:focus,select:focus,textarea:focus{outline:none}
button{cursor:pointer;font-family:'Sarabun',sans-serif}
button:disabled{opacity:.5;cursor:not-allowed}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c4bfb0;border-radius:4px}

/* ── VARIABLES ── */
:root{
  --bg:#f7f6f2;
  --bg2:#eeeae0;
  --card:#ffffff;
  --border:#e0dbd0;
  --text:#1a1a2e;
  --text2:#6b6560;
  --text3:#9e9890;
  --accent:#c8521a;
  --accent2:#e8742a;
  --green:#2d7d4f;
  --blue:#1e5fa0;
  --yellow:#c49b1a;
  --red:#c0392b;
  --sidebar-w:240px;
}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100dvh}
.sidebar{width:var(--sidebar-w);background:#1a1a2e;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100dvh;background:var(--bg)}
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:sticky;top:0;flex-direction:row;flex-wrap:wrap;overflow:visible;padding:8px}
  .main{margin-left:0}
  .sidebar-brand,.sidebar-section-label{display:none}
  .sidebar-bottom{display:none}
}

/* ── SIDEBAR ── */
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sidebar-logo{font-family:'Kanit',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px;line-height:1.2}
.sidebar-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 10px}
.sidebar-section-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:12px 10px 6px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:none;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;text-align:left;margin-bottom:2px;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn .icon{font-size:16px;width:20px;text-align:center}
.sidebar-bottom{padding:16px 10px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto}
@media(max-width:768px){
  .nav-btn{width:auto;padding:8px 10px;flex-direction:column;gap:2px;font-size:10px;border-radius:8px}
  .nav-btn .icon{font-size:18px}
}

/* ── PAGE ── */
.page{padding:28px 32px;max-width:1200px}
@media(max-width:768px){.page{padding:16px}}
.page-header{margin-bottom:24px}
.page-title{font-family:'Kanit',sans-serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:4px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.stat-grid{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-bar,var(--accent))}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.stat-value{font-family:'Kanit',sans-serif;font-size:26px;font-weight:700;color:var(--text);margin-top:6px;letter-spacing:-1px}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}

/* ── TABLE ── */
.tbl-wrap{border-radius:12px;border:1px solid var(--border);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f0ede5;color:var(--text2);font-weight:700;padding:11px 14px;text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#faf8f4}
.tbl-wrap-scroll{overflow-x:auto}

/* ── FORMS ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.3px}
.inp{width:100%;padding:10px 13px;background:#faf8f4;border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;transition:border .15s}
.inp:focus{border-color:var(--accent);background:#fff}
.inp-sm{padding:7px 11px;font-size:13px}
select.inp option{background:#fff;color:var(--text)}
textarea.inp{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.field-row{grid-template-columns:1fr}}

/* ── BUTTONS ── */
.btn{padding:10px 20px;border-radius:9px;border:none;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(200,82,26,0.25)}
.btn-primary:hover{background:var(--accent2)}
.btn-success{background:var(--green);color:#fff}
.btn-ghost{background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{color:var(--text);border-color:#c4bfb0}
.btn-danger{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.25);color:var(--red)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:7px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-icon{padding:7px;border-radius:7px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:rgba(45,125,79,0.12);color:var(--green);border:1px solid rgba(45,125,79,0.2)}
.badge-orange{background:rgba(200,82,26,0.12);color:var(--accent);border:1px solid rgba(200,82,26,0.2)}
.badge-blue{background:rgba(30,95,160,0.12);color:var(--blue);border:1px solid rgba(30,95,160,0.2)}
.badge-yellow{background:rgba(196,155,26,0.12);color:var(--yellow);border:1px solid rgba(196,155,26,0.2)}
.badge-gray{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(26,26,46,0.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-family:'Kanit',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:20px}

/* ── PROGRESS ── */
.progress-track{height:7px;border-radius:8px;background:var(--bg2);overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width .5s}

/* ── MISC ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
.skeleton{background:linear-gradient(90deg,#eeeae0 25%,#e5e0d5 50%,#eeeae0 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.text-right{text-align:right}
.text-center{text-align:center}
.fw-bold{font-weight:700}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.gap-2{gap:8px}
.gap-3{gap:12px}
.mt-1{margin-top:6px}
.mt-2{margin-top:12px}
.mt-3{margin-top:18px}
.mb-2{margin-bottom:12px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.12);animation:fadeIn .2s ease}
.toast-ok{background:#1a1a2e;color:#fff}
.toast-err{background:var(--red);color:#fff}

/* ── LOADING BAR ── */
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));background-size:200%;animation:shimmer .8s infinite}

/* ── CHART BARS ── */
.chart-bar-wrap{display:flex;flex-direction:column;gap:10px}
.chart-row{display:grid;grid-template-columns:120px 1fr 100px;gap:10px;align-items:center;font-size:12px}
.chart-label{color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-val{color:var(--text);font-weight:700;text-align:right}

/* ── SUMMARY TABLE FOOTER ── */
.tbl tfoot td{background:#f0ede5;font-weight:700;color:var(--text)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filter-bar .inp{width:auto;min-width:140px}

/* ── TOP LOADING ── */
.top-loader{position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#c8521a,#e8742a);z-index:9999;animation:shimmer 1s linear infinite;background-size:200%}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL = "https://lytlvcjiwzlthfibuypr.supabase.co";
const SUPABASE_KEY = "sb_publishable_TiF_bijZBPRqxR68Bl6pFw_5UMHWsnc"; // ← ใส่ key ที่ regenerate มา

// ── SUPABASE API ─────────────────────────────────────────────────
const sbHeaders = () => ({
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Prefer": "return=representation",
});

async function sbGet(table, params = "") {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
      headers: { ...sbHeaders(), "Prefer": "" }
    });
    const data = await res.json();
    if (!res.ok) return { ok: false, error: data.message || JSON.stringify(data) };
    return { ok: true, data };
  } catch(e) { return { ok: false, error: e.message }; }
}

async function sbPost(table, body) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: "POST", headers: sbHeaders(), body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) return { ok: false, error: data.message || JSON.stringify(data) };
    return { ok: true, data: Array.isArray(data) ? data[0] : data };
  } catch(e) { return { ok: false, error: e.message }; }
}

async function sbPatch(table, id_col, id_val, body) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${id_col}=eq.${encodeURIComponent(id_val)}`, {
      method: "PATCH", headers: sbHeaders(), body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) return { ok: false, error: data.message || JSON.stringify(data) };
    return { ok: true, data: Array.isArray(data) ? data[0] : data };
  } catch(e) { return { ok: false, error: e.message }; }
}

async function sbDelete(table, id_col, id_val) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${id_col}=eq.${encodeURIComponent(id_val)}`, {
      method: "DELETE", headers: { ...sbHeaders(), "Prefer": "" }
    });
    if (!res.ok) { const d = await res.json(); return { ok: false, error: d.message }; }
    return { ok: true };
  } catch(e) { return { ok: false, error: e.message }; }
}

// ── UTILS ────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat("th-TH",{minimumFractionDigits:2}).format(n||0);
const fmtN = n => new Intl.NumberFormat("th-TH").format(n||0);
const thDate = iso => iso ? new Date(iso).toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"}) : "-";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

const COLORS = ["#c8521a","#1e5fa0","#2d7d4f","#c49b1a","#7c3aed","#0891b2","#be185d","#047857"];

// ── TOAST ────────────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { if(msg) { const t=setTimeout(onClose,3000); return ()=>clearTimeout(t); } }, [msg]);
  if(!msg) return null;
  return <div className={`toast toast-${type}`}>{msg}</div>;
}

// ── CONFIRM DIALOG ───────────────────────────────────────────────
function Confirm({ msg, onOk, onCancel }) {
  return (
    <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&onCancel()}>
      <div className="modal" style={{maxWidth:380}}>
        <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>⚠️</div>
        <div style={{textAlign:"center",fontSize:15,color:"var(--text)",marginBottom:20}}>{msg}</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onOk} className="btn btn-danger" style={{flex:1,justifyContent:"center"}}>ยืนยัน</button>
          <button onClick={onCancel} className="btn btn-ghost" style={{flex:1,justifyContent:"center"}}>ยกเลิก</button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════════════
function Dashboard({ onNav }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      sbGet("expenses", "?select=total_amount,project_id,project_name,category_id,category_name"),
      sbGet("projects", "?select=project_id"),
      sbGet("expenses", "?select=*&order=created_at.desc&limit=10"),
    ]).then(([er, pr, rr]) => {
      if(er.ok && pr.ok && rr.ok) {
        const totalAmount = er.data.reduce((s,e)=>s+(parseFloat(e.total_amount)||0),0);
        const byProject = {};
        er.data.forEach(e => {
          if(!e.project_id) return;
          if(!byProject[e.project_id]) byProject[e.project_id] = { project_name: e.project_name||e.project_id, total_amount: 0 };
          byProject[e.project_id].total_amount += parseFloat(e.total_amount)||0;
        });
        const byCategory = {};
        er.data.forEach(e => {
          if(!e.category_id) return;
          if(!byCategory[e.category_id]) byCategory[e.category_id] = { category: e.category_name||e.category_id, total_amount: 0 };
          byCategory[e.category_id].total_amount += parseFloat(e.total_amount)||0;
        });
        setData({
          totalProjects: pr.data.length,
          totalExpenses: er.data.length,
          totalAmount,
          recentExpenses: rr.data,
          byProject: Object.values(byProject).sort((a,b)=>b.total_amount-a.total_amount).slice(0,5),
          byCategory: Object.values(byCategory).sort((a,b)=>b.total_amount-a.total_amount).slice(0,5),
        });
      }
      setLoading(false);
    });
  }, []);

  if(loading) return (
    <div className="page fade-in">
      <div className="page-header"><div className="page-title">แดชบอร์ด</div></div>
      <div className="stat-grid">{[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:90}}/>)}</div>
      <div className="skeleton" style={{height:300,marginBottom:16}}/>
    </div>
  );

  if(!data) return <div className="page"><div className="empty"><div className="empty-icon">📡</div>ไม่สามารถโหลดข้อมูลได้</div></div>;

  const { totalProjects, totalExpenses, totalAmount, recentExpenses, byProject, byCategory } = data;
  const maxAmt = Math.max(...(byProject||[]).map(p=>p.total_amount||0), 1);

  return (
    <div className="page fade-in">
      <div className="page-header">
        <div className="page-title">แดชบอร์ด</div>
        <div className="page-subtitle">ภาพรวมค่าใช้จ่ายทุกโครงการ</div>
      </div>

      <div className="stat-grid">
        {[
          {label:"โครงการทั้งหมด", value:fmtN(totalProjects||0), sub:"โครงการ", color:"var(--accent)"},
          {label:"รายการค่าใช้จ่าย", value:fmtN(totalExpenses||0), sub:"รายการ", color:"var(--blue)"},
          {label:"ยอดรวมทั้งหมด", value:fmt(totalAmount||0), sub:"บาท", color:"var(--green)"},

        ].map((s,i)=>(
          <div key={i} className="stat-card" style={{"--accent-bar":s.color}}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        {/* By Project */}
        <div className="card">
          <div style={{fontFamily:"'Kanit',sans-serif",fontWeight:700,fontSize:15,marginBottom:16}}>ค่าใช้จ่ายตามโครงการ</div>
          {(byProject||[]).length === 0 ? <div className="empty" style={{padding:20}}>ยังไม่มีข้อมูล</div> : (
            <div className="chart-bar-wrap">
              {(byProject||[]).map((p,i)=>{
                const pct = ((p.total_amount||0)/maxAmt)*100;
                return (
                  <div key={i} className="chart-row">
                    <div className="chart-label" title={p.project_name}>{p.project_name}</div>
                    <div className="progress-track" style={{background:"var(--bg2)"}}>
                      <div className="progress-fill" style={{width:`${pct}%`,background:COLORS[i%COLORS.length]}}/>
                    </div>
                    <div className="chart-val">{fmt(p.total_amount)} ฿</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* By Category */}
        <div className="card">
          <div style={{fontFamily:"'Kanit',sans-serif",fontWeight:700,fontSize:15,marginBottom:16}}>ค่าใช้จ่ายตามหมวดหมู่</div>
          {(byCategory||[]).length === 0 ? <div className="empty" style={{padding:20}}>ยังไม่มีข้อมูล</div> : (
            <div className="chart-bar-wrap">
              {(byCategory||[]).map((c,i)=>{
                const maxC = Math.max(...(byCategory||[]).map(x=>x.total_amount||0),1);
                const pct = ((c.total_amount||0)/maxC)*100;
                return (
                  <div key={i} className="chart-row">
                    <div className="chart-label" title={c.category}>{c.category}</div>
                    <div className="progress-track">
                      <div className="progress-fill" style={{width:`${pct}%`,background:COLORS[(i+3)%COLORS.length]}}/>
                    </div>
                    <div className="chart-val">{fmt(c.total_amount)} ฿</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Recent Expenses */}
      <div className="card">
        <div className="flex-between mb-2">
          <div style={{fontFamily:"'Kanit',sans-serif",fontWeight:700,fontSize:15}}>รายการล่าสุด</div>
          <button className="btn btn-ghost btn-sm" onClick={()=>onNav("expenses")}>ดูทั้งหมด →</button>
        </div>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr><th>วันที่</th><th>โครงการ</th><th>สนาม/จังหวัด</th><th>หมวด</th><th>รายการ</th><th className="text-right">จำนวนเงิน</th></tr></thead>
            <tbody>
              {(recentExpenses||[]).length === 0
