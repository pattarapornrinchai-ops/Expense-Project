function ExpensesPage({ showFlash, setLoading }) {
  const [expenses, setExpenses] = useState([]);
  const [projects, setProjects] = useState([]);
  const [locations, setLocations] = useState([]);
  const [categories, setCategories] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [loc, setLoc] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [filter, setFilter] = useState({ project_id:"", location_id:"", category_id:"", search:"" });
  const [showSupplierModal, setShowSupplierModal] = useState(false);
  const [supplierForm, setSupplierForm] = useState({ name:"", status:"บุคคลธรรมดา", tags:"", phone:"", contact_name:"", line_id:"", note:"" });
  const [supplierTags, setSupplierTags] = useState([]);

  const blankHeader = { project_id:"", location_id:"", category_id:"", supplier_id:"", expense_date:"", file_quote:"", file_slip:"" };
  const blankLine   = () => ({ id: uid(), description:"", unit_price:"", quantity:"1", note:"" });
  const [form, setForm]   = useState(blankHeader);
  const [lines, setLines] = useState([blankLine()]);

  const load = async () => {
    setLoc(true);
    const [er, pr, lr, cr, sr] = await Promise.all([
      sbGet("expenses","?order=created_at.desc"),
      sbGet("projects","?order=project_name.asc&select=project_id,project_name"),
      sbGet("locations","?order=location_name.asc&select=location_id,location_name"),
      sbGet("categories","?order=category_name.asc&select=category_id,category_name"),
      sbGet("suppliers","?order=name.asc"),
    ]);
    if(er.ok) setExpenses(er.data);
    if(pr.ok) setProjects(pr.data);
    if(lr.ok) setLocations(lr.data);
    if(cr.ok) setCategories(cr.data);
    if(sr.ok) setSuppliers(sr.data);
    setLoc(false);
  };
  useEffect(() => { load(); }, []);

  const totalAmount = useMemo(()=>lines.reduce((s,l)=>(s+(parseFloat(l.unit_price)||0)*(parseFloat(l.quantity)||0)),0),[lines]);

  const filtered = useMemo(()=>expenses.filter(e=>{
    if(filter.project_id && e.project_id !== filter.project_id) return false;
    if(filter.location_id && e.location_id !== filter.location_id) return false;
    if(filter.category_id && e.category_id !== filter.category_id) return false;
    if(filter.search && !`${e.description}${e.project_name}${e.location_name}${e.category_name}`.toLowerCase().includes(filter.search.toLowerCase())) return false;
    return true;
  }),[expenses, filter]);

  const filteredTotal = useMemo(()=>filtered.reduce((s,e)=>s+(parseFloat(e.total_amount)||0),0),[filtered]);

  const openAdd = () => {
    setForm(blankHeader);
    setLines([blankLine()]);
    setEditItem(null); setShowModal(true);
  };
  const openEdit = e => {
    setForm({ project_id:e.project_id, location_id:e.location_id, category_id:e.category_id, supplier_id:e.supplier_id||"", expense_date:e.expense_date||"", file_quote:e.file_quote||"", file_slip:e.file_slip||"" });
    setLines([{ id:uid(), description:e.description, unit_price:e.unit_price, quantity:e.quantity, note:e.note||"" }]);
    setEditItem(e); setShowModal(true);
  };

  const setLine = (id, field, val) => setLines(prev => prev.map(l => l.id===id ? {...l,[field]:val} : l));
  const addLine = () => setLines(prev => [...prev, blankLine()]);
  const removeLine = id => setLines(prev => prev.length > 1 ? prev.filter(l=>l.id!==id) : prev);

  const aiParse = async () => {
    showFlash("ฟีเจอร์ AI ยังไม่รองรับกับ Supabase ในขณะนี้","err");
  };

  const save = async () => {
    if(!form.project_id||!form.location_id||!form.category_id){
      showFlash("กรุณาเลือก โครงการ / สนาม / หมวด ให้ครบ","err"); return;
    }
    const validLines = lines.filter(l=>l.description.trim()&&l.unit_price);
    if(validLines.length===0){ showFlash("กรุณากรอกรายการและราคาอย่างน้อย 1 รายการ","err"); return; }
    setLoading(true);
    const proj = projects.find(p=>p.project_id===form.project_id);
    const loc2 = form.location_id==="ALL" ? {location_id:"ALL",location_name:"ทั้งโครงการ"} : locations.find(l=>l.location_id===form.location_id);
    const cat  = categories.find(c=>c.category_id===form.category_id);
    const sup  = suppliers.find(s=>s.supplier_id===form.supplier_id);
    const basePayload = {
      project_id:form.project_id, project_name:proj?.project_name||"",
      location_id:form.location_id, location_name:loc2?.location_name||"",
      category_id:form.category_id, category_name:cat?.category_name||"",
      supplier_id:form.supplier_id||null, supplier_name:sup?.name||"", supplier_status:sup?.status||"",
      file_quote:form.file_quote||"", file_slip:form.file_slip||"",
      expense_date:form.expense_date||null,
    };
    if(editItem) {
      // แก้ไข: อัปเดตแค่ record เดิม (line แรก)
      const l = validLines[0];
      const unit_price = parseFloat(l.unit_price)||0;
      const quantity   = parseFloat(l.quantity)||1;
      const r = await sbPatch("expenses","expense_id",editItem.expense_id, {
        ...basePayload, description:l.description, unit_price, quantity, total_amount:unit_price*quantity, note:l.note||""
      });
      if(r.ok){ showFlash("แก้ไขสำเร็จ ✓"); setShowModal(false); await load(); }
      else showFlash(r.error||"เกิดข้อผิดพลาด","err");
    } else {
      // เพิ่มใหม่: insert ทุก line พร้อมกัน
      const results = await Promise.all(validLines.map(l => {
        const unit_price = parseFloat(l.unit_price)||0;
        const quantity   = parseFloat(l.quantity)||1;
        return sbPost("expenses", { ...basePayload, expense_id:uid(), description:l.description, unit_price, quantity, total_amount:unit_price*quantity, note:l.note||"" });
      }));
      const failed = results.filter(r=>!r.ok);
      if(failed.length===0){ showFlash(`บันทึก ${validLines.length} รายการสำเร็จ ✓`); setShowModal(false); await load(); }
      else showFlash(failed[0].error||"เกิดข้อผิดพลาด","err");
    }
    setLoading(false);
  };

  const del = async id => {
    setLoading(true);
    const r = await sbDelete("expenses","expense_id",id);
    if(r.ok){ showFlash("ลบสำเร็จ"); await load(); }
    else showFlash(r.error||"ลบไม่สำเร็จ","err");
    setLoading(false); setConfirm(null);
  };

  const saveSupplierInline = async () => {
    if(!supplierForm.name){ showFlash("กรุณากรอกชื่อร้าน/บริษัท","err"); return; }
    setLoading(true);
    const newId = uid();
    const r = await sbPost("suppliers",{supplier_id:newId,...supplierForm,tags:supplierTags.join(",")});
    if(r.ok){
      showFlash("เพิ่มซัพพลายเออร์สำเร็จ ✓");
      const sr = await sbGet("suppliers","?order=name.asc");
      if(sr.ok){ setSuppliers(sr.data); setForm({...form, supplier_id: newId}); }
      setShowSupplierModal(false);
      setSupplierForm({ name:"", status:"บุคคลธรรมดา", tags:"", phone:"", contact_name:"", line_id:"", note:"" });
      setSupplierTags([]);
    } else showFlash(r.error||"เกิดข้อผิดพลาด","err");
    setLoading(false);
  };

  const selectedSupplier = useMemo(() => suppliers.find(s=>s.supplier_id===form.supplier_id), [suppliers, form.supplier_id]);

  return (
    <div className="page fade-in">
      <div className="flex-between page-header">
        <div><div className="page-title">ค่าใช้จ่าย</div><div className="page-subtitle">บันทึกและดูรายการค่าใช้จ่ายทั้งหมด</div></div>
        <button className="btn btn-primary" onClick={openAdd}>＋ บันทึกรายจ่าย</button>
      </div>

      {/* Filter bar */}
      <div className="filter-bar">
        <input className="inp inp-sm" style={{minWidth:160}} placeholder="🔍 ค้นหารายการ..." value={filter.search} onChange={e=>setFilter({...filter,search:e.target.value})}/>
        <select className="inp inp-sm" value={filter.project_id} onChange={e=>setFilter({...filter,project_id:e.target.value})}>
          <option value="">📁 ทุกโครงการ</option>
          {projects.map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
        </select>
        <select className="inp inp-sm" value={filter.location_id} onChange={e=>setFilter({...filter,location_id:e.target.value})}>
          <option value="">📍 ทุกสนาม</option>
          {locations.map(l=><option key={l.location_id} value={l.location_id}>{l.location_name}</option>)}
        </select>
        <select className="inp inp-sm" value={filter.category_id} onChange={e=>setFilter({...filter,category_id:e.target.value})}>
          <option value="">🏷️ ทุกหมวด</option>
          {categories.map(c=><option key={c.category_id} value={c.category_id}>{c.category_name}</option>)}
        </select>
        {(filter.project_id||filter.location_id||filter.category_id||filter.search) && (
          <button className="btn btn-ghost btn-sm" onClick={()=>setFilter({project_id:"",location_id:"",category_id:"",search:""})}>✕ ล้าง</button>
        )}
      </div>

      {/* Summary */}
      <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
        <div className="card-sm" style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"var(--text2)"}}>แสดง <strong>{filtered.length}</strong> รายการ</span>
          <span style={{fontSize:12,color:"var(--text2)"}}>ยอดรวม <strong style={{color:"var(--accent)",fontSize:14}}>{fmt(filteredTotal)} ฿</strong></span>
        </div>
      </div>

      {loc ? <div className="skeleton" style={{height:300}}/> : (
        <div className="tbl-wrap tbl-wrap-scroll">
          <table className="tbl">
            <thead>
              <tr>
                <th>วันที่</th><th>โครงการ</th><th>สนาม/จังหวัด</th><th>หมวด</th>
                <th>รายการ</th><th className="text-right">ราคา/หน่วย</th><th className="text-right">จำนวน</th>
                <th className="text-right">รวม</th><th>เอกสาร</th><th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0
                ? <tr><td colSpan={10} className="empty">ไม่มีรายการ</td></tr>
                : filtered.map((e,i)=>(
                  <tr key={e.expense_id}>
                    <td style={{whiteSpace:"nowrap",fontSize:12,color:"var(--text2)"}}>{thDate(e.expense_date||e.created_at)}</td>
                    <td><span className="badge badge-blue" style={{fontSize:11}}>{e.project_name}</span></td>
                    <td style={{fontSize:12}}>{e.location_name}</td>
                    <td><span className="badge badge-gray" style={{fontSize:11}}>{e.category_name}</span></td>
                    <td style={{maxWidth:200}}>
                      <div style={{fontSize:13,fontWeight:500}}>{e.description}</div>
                      {e.note && <div style={{fontSize:11,color:"var(--text3)"}}>{e.note}</div>}
                    </td>
                    <td className="text-right" style={{fontSize:13}}>{fmt(e.unit_price)}</td>
                    <td className="text-right" style={{fontSize:13}}>{fmtN(e.quantity)}</td>
                    <td className="text-right fw-bold" style={{color:"var(--accent)"}}>{fmt(e.total_amount)} ฿</td>
                    <td>
                      <div style={{display:"flex",gap:4}}>
                        {e.file_quote && <a href={e.file_quote} target="_blank" rel="noreferrer" className="badge badge-green" style={{textDecoration:"none",cursor:"pointer"}}>📄 ใบเสนอ</a>}
                        {e.file_slip  && <a href={e.file_slip}  target="_blank" rel="noreferrer" className="badge badge-yellow" style={{textDecoration:"none",cursor:"pointer"}}>🧾 สลิป</a>}
                      </div>
                    </td>
                    <td>
                      <div style={{display:"flex",gap:5}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>openEdit(e)}>✏️</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>setConfirm({id:e.expense_id,name:e.description})}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                ))
              }
            </tbody>
            {filtered.length > 0 && (
              <tfoot>
                <tr>
                  <td colSpan={7} className="text-right" style={{fontSize:13}}>ยอดรวม</td>
                  <td className="text-right" style={{fontSize:15,color:"var(--accent)"}}>{fmt(filteredTotal)} ฿</td>
                  <td colSpan={2}/>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
      )}

      {/* Add/Edit Modal */}
      {showModal && (
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-title">{editItem?"✏️ แก้ไขรายจ่าย":"➕ บันทึกรายจ่ายใหม่"}</div>

            {/* Supplier Selector */}
            <div className="field">
              <label>ซัพพลายเออร์/ร้านค้า/บริษัท</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <select className="inp" style={{flex:1}} value={form.supplier_id} onChange={e=>setForm({...form,supplier_id:e.target.value})}>
                  <option value="">— ไม่ระบุ / จ่ายทั่วไป —</option>
                  {suppliers.map(s=><option key={s.supplier_id} value={s.supplier_id}>{s.name}{s.status==="นิติบุคคล"?" (นิติบุคคล)":""}</option>)}
                </select>
                <button type="button" className="btn btn-ghost btn-sm" onClick={()=>setShowSupplierModal(true)} style={{whiteSpace:"nowrap"}}>＋ เพิ่มใหม่</button>
              </div>
              {selectedSupplier && (
                <div className="card-sm" style={{marginTop:8,background:"#f0f7ff",border:"1px solid #c0d8f0",display:"flex",gap:16,flexWrap:"wrap"}}>
                  {selectedSupplier.contact_name && <span style={{fontSize:12}}><strong>👤</strong> {selectedSupplier.contact_name}</span>}
                  {selectedSupplier.phone && <span style={{fontSize:12}}><strong>📞</strong> <a href={`tel:${selectedSupplier.phone}`} style={{color:"var(--blue)"}}>{selectedSupplier.phone}</a></span>}
                  {selectedSupplier.line_id && <span style={{fontSize:12}}><strong>💬</strong> {selectedSupplier.line_id}</span>}
                  {selectedSupplier.note && <span style={{fontSize:12,color:"var(--text2)"}}>{selectedSupplier.note}</span>}
                  <span className={`badge ${selectedSupplier.status==="นิติบุคคล"?"badge-blue":"badge-gray"}`} style={{fontSize:10}}>{selectedSupplier.status||"บุคคลธรรมดา"}</span>
                </div>
              )}
            </div>

            <div className="field-row">
              <div className="field">
                <label>โครงการ *</label>
                <select className="inp" value={form.project_id} onChange={e=>setForm({...form,project_id:e.target.value})}>
                  <option value="">— เลือกโครงการ —</option>
                  {projects.map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
                </select>
              </div>
              <div className="field">
                <label>สนาม/จังหวัด *</label>
                <select className="inp" value={form.location_id} onChange={e=>setForm({...form,location_id:e.target.value})}>
                  <option value="">— เลือกสนาม —</option>
                  <option value="ALL">🏢 ทั้งโครงการ</option>
                  {locations.map(l=><option key={l.location_id} value={l.location_id}>{l.location_name}</option>)}
                </select>
              </div>
            </div>

            <div className="field-row">
              <div className="field">
                <label>หมวดหมู่ *</label>
                <select className="inp" value={form.category_id} onChange={e=>setForm({...form,category_id:e.target.value})}>
                  <option value="">— เลือกหมวด —</option>
                  {categories.map(c=><option key={c.category_id} value={c.category_id}>{c.category_name}</option>)}
                </select>
              </div>
              <div className="field">
                <label>วันที่</label>
                <input className="inp" type="date" value={form.expense_date} onChange={e=>setForm({...form,expense_date:e.target.value})}/>
              </div>
            </div>

            <div className="field"><label>รายการ/คำอธิบาย *</label>
              {/* Line items */}
              <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
                {lines.map((l,i)=>(
                  <div key={l.id} style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontSize:11,color:"var(--text3)",fontWeight:700,minWidth:20}}>#{i+1}</span>
                      <input className="inp" style={{flex:1}} value={l.description}
                        onChange={e=>setLine(l.id,"description",e.target.value)}
                        placeholder="เช่น ค่าจ้างทีมงาน, น้ำแข็งหลอดใหญ่"/>
                      {lines.length > 1 && (
                        <button onClick={()=>removeLine(l.id)} style={{background:"none",border:"none",color:"var(--red)",fontSize:18,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
                      )}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <div style={{flex:1}}>
                        <input className="inp inp-sm" type="number" step="0.01" value={l.unit_price}
                          onChange={e=>setLine(l.id,"unit_price",e.target.value)} placeholder="ราคา/หน่วย (฿)"/>
                      </div>
                      <span style={{color:"var(--text3)",fontSize:12}}>×</span>
                      <div style={{width:80}}>
                        <input className="inp inp-sm" type="number" step="1" value={l.quantity}
                          onChange={e=>setLine(l.id,"quantity",e.target.value)} placeholder="จำนวน"/>
                      </div>
                      <div style={{minWidth:90,textAlign:"right",fontFamily:"Kanit,sans-serif",fontWeight:700,fontSize:14,color:"var(--accent)"}}>
                        {fmt((parseFloat(l.unit_price)||0)*(parseFloat(l.quantity)||0))} ฿
                      </div>
                    </div>
                    <input className="inp inp-sm" value={l.note}
                      onChange={e=>setLine(l.id,"note",e.target.value)} placeholder="หมายเหตุ (ถ้ามี)"/>
                  </div>
                ))}
                <button onClick={addLine} className="btn btn-ghost btn-sm" style={{alignSelf:"flex-start",marginTop:2}}>
                  ＋ เพิ่มรายการ
                </button>
              </div>
            </div>

            {/* Total */}
            <div className="card-sm" style={{background:"#fef9f0",border:"1px solid #f0e0c0",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,color:"var(--text2)"}}>ยอดรวมทั้งหมด {lines.filter(l=>l.description&&l.unit_price).length > 1 && <span style={{color:"var(--text3)"}}>({lines.filter(l=>l.description&&l.unit_price).length} รายการ)</span>}</span>
              <span style={{fontFamily:"'Kanit',sans-serif",fontSize:20,fontWeight:700,color:"var(--accent)"}}>{fmt(totalAmount)} ฿</span>
            </div>

            <div className="field-row">
              <div className="field"><label>🔗 Link ใบเสนอราคา</label><input className="inp" value={form.file_quote} onChange={e=>setForm({...form,file_quote:e.target.value})} placeholder="https://drive.google.com/..."/></div>
              <div className="field"><label>🔗 Link สลิปโอนเงิน</label><input className="inp" value={form.file_slip} onChange={e=>setForm({...form,file_slip:e.target.value})} placeholder="https://drive.google.com/..."/></div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={save} className="btn btn-primary" style={{flex:1,justifyContent:"center"}}>💾 บันทึก</button>
              <button onClick={()=>setShowModal(false)} className="btn btn-ghost">ยกเลิก</button>
            </div>
          </div>
        </div>
      )}
      {confirm && <Confirm msg={`ต้องการลบ "${confirm.name}" ใช่มั้ย?`} onOk={()=>del(confirm.id)} onCancel={()=>setConfirm(null)}/>}

      {/* Inline Add Supplier Modal */}
      {showSupplierModal && (
        <div className="modal-backdrop" style={{zIndex:600}} onClick={e=>e.target===e.currentTarget&&setShowSupplierModal(false)}>
          <div className="modal" style={{maxWidth:500}}>
            <div className="modal-title">➕ เพิ่มซัพพลายเออร์ใหม่</div>
            <div className="field"><label>ชื่อร้าน/บริษัท *</label><input className="inp" value={supplierForm.name} onChange={e=>setSupplierForm({...supplierForm,name:e.target.value})} placeholder="เช่น ร้าน ABC, บริษัท XYZ จำกัด"/></div>
            <div className="field">
              <label>ประเภท</label>
              <div style={{display:"flex",gap:10}}>
                {["บุคคลธรรมดา","นิติบุคคล"].map(s=>(
                  <button key={s} onClick={()=>setSupplierForm({...supplierForm,status:s})}
                    className={`btn btn-sm ${supplierForm.status===s?"btn-primary":"btn-ghost"}`}>{s}</button>
                ))}
              </div>
            </div>
            <div className="field">
              <label>ประเภทงาน</label>
              <div className="chip-row" style={{marginTop:6}}>
                {["ขนส่ง","Staff","อาหาร","เบรค/ผลไม้","เครื่องดื่ม/น้ำแข็ง","วัสดุก่อสร้าง","ช่างไฟ","ช่างเสียง","ถ่ายภาพ","อื่นๆ"].map(t=>(
                  <button key={t} onClick={()=>setSupplierTags(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t])}
                    className={`btn btn-xs ${supplierTags.includes(t)?"btn-primary":"btn-ghost"}`}>{t}</button>
                ))}
              </div>
            </div>
            <div className="field-row">
              <div className="field"><label>ชื่อผู้ติดต่อ</label><input className="inp" value={supplierForm.contact_name} onChange={e=>setSupplierForm({...supplierForm,contact_name:e.target.value})} placeholder="ชื่อ-นามสกุล"/></div>
              <div className="field"><label>เบอร์โทร</label><input className="inp" value={supplierForm.phone} onChange={e=>setSupplierForm({...supplierForm,phone:e.target.value})} placeholder="08x-xxx-xxxx"/></div>
            </div>
            <div className="field"><label>หมายเหตุ</label><input className="inp" value={supplierForm.note} onChange={e=>setSupplierForm({...supplierForm,note:e.target.value})} placeholder="เช่น สั่งล่วงหน้า 3 วัน"/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={saveSupplierInline} className="btn btn-primary" style={{flex:1,justifyContent:"center"}}>💾 บันทึกและเลือก</button>
              <button onClick={()=>setShowSupplierModal(false)} className="btn btn-ghost">ยกเลิก</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  SUMMARY PAGE
// ════════════════════════════════════════════════════════════════
function SummaryPage() {
  const [data, setData] = useState(null);
  const [projects, setProjects] = useState([]);
  const [filter, setFilter] = useState({ project_id:"" });
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    const pid = filter.project_id;
    const expFilter = pid ? `?project_id=eq.${pid}&select=*` : "?select=*";
    Promise.all([
      sbGet("expenses", expFilter),
      sbGet("projects","?order=project_name.asc&select=project_id,project_name,budget"),
    ]).then(([er, pr])=>{
      if(er.ok && pr.ok){
        const exps = er.data;
        const grandTotal = exps.reduce((s,e)=>s+(parseFloat(e.total_amount)||0),0);
        const byLoc={}, byCat={}, byProj={};
        exps.forEach(e=>{
          const lid=e.location_id||"ไม่ระบุ", lname=e.location_name||"ไม่ระบุ";
          if(!byLoc[lid]) byLoc[lid]={location_name:lname,count:0,total_amount:0};
          byLoc[lid].count++; byLoc[lid].total_amount+=parseFloat(e.total_amount)||0;

          const cid=e.category_id||"ไม่ระบุ", cname=e.category_name||"ไม่ระบุ";
          if(!byCat[cid]) byCat[cid]={category_name:cname,count:0,total_amount:0};
          byCat[cid].count++; byCat[cid].total_amount+=parseFloat(e.total_amount)||0;

          const ppid=e.project_id||"ไม่ระบุ", pname=e.project_name||"ไม่ระบุ";
          if(!byProj[ppid]) byProj[ppid]={project_name:pname,count:0,total_amount:0,budget:pr.data.find(p=>p.project_id===ppid)?.budget||0};
          byProj[ppid].count++; byProj[ppid].total_amount+=parseFloat(e.total_amount)||0;
        });
        setData({
          grandTotal,
          byLocation: Object.values(byLoc).sort((a,b)=>b.total_amount-a.total_amount),
          byCategory: Object.values(byCat).sort((a,b)=>b.total_amount-a.total_amount),
          byProject:  Object.values(byProj).sort((a,b)=>b.total_amount-a.total_amount),
        });
        setProjects(pr.data);
      }
      setLoading(false);
    });
  },[filter.project_id]);

  const reload = (pid) => {
    setLoading(true);
    setFilter({project_id:pid});
  };

  return (
    <div className="page fade-in">
      <div className="page-header">
        <div className="page-title">สรุปค่าใช้จ่าย</div>
        <div className="page-subtitle">รายงานแยกตามโครงการ สนาม และหมวดหมู่</div>
      </div>

      <div className="filter-bar" style={{marginBottom:20}}>
        <select className="inp inp-sm" value={filter.project_id} onChange={e=>reload(e.target.value)}>
          <option value="">📁 ทุกโครงการ</option>
          {projects.map(p=><option key={p.project_id} value={p.project_id}>{p.project_name}</option>)}
        </select>
      </div>

      {loading ? <div className="skeleton" style={{height:400}}/> : !data ? <div className="empty">โหลดไม่สำเร็จ</div> : (
        <div style={{display:"grid",gap:20}}>
          {/* By Location */}
          <div className="card">
            <div style={{fontFamily:"'Kanit',sans-serif",fontWeight:700,fontSize:16,marginBottom:16}}>📍 สรุปตามสนาม/จังหวัด</div>
            <div className="tbl-wrap">
              <table className="tbl">
                <thead><tr><th>สนาม/จังหวัด</th><th className="text-right">รายการ</th><th className="text-right">ยอดรวม</th><th className="text-right">สัดส่วน</th></tr></thead>
                <tbody>
                  {(data.byLocation||[]).map((l,i)=>{
                    const pct = data.grandTotal ? ((l.total_amount/data.grandTotal)*100).toFixed(1) : 0;
                    return (
                      <tr key={i}>
                        <td><strong>{l.location_name}</strong></td>
                        <td className="text-right">{fmtN(l.count)}</td>
                        <td className="text-right fw-bold" style={{color:"var(--accent)"}}>{fmt(l.total_amount)} ฿</td>
                        <td className="text-right" style={{minWidth:120}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
                            <div className="progress-track" style={{width:60}}>
                              <div className="progress-fill" style={{width:`${pct}%`,background:COLORS[i%COLORS.length]}}/>
                            </div>
                            <span style={{fontSize:11,color:"var(--text2)"}}>{pct}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr><td>รวมทั้งหมด</td><td className="text-right">{fmtN((data.byLocation||[]).reduce((s,l)=>s+l.count,0))}</td><td className="text-right" style={{color:"var(--accent)"}}>{fmt(data.grandTotal||0)} ฿</td><td/></tr>
                </tfoot>
              </table>
            </div>
          </div>

          {/* By Category */}
          <div className="card">
            <div style={{fontFamily:"'Kanit',sans-serif",fontWeight:700,fontSize:16,marginBottom:16}}>🏷️ สรุปตามหมวดหมู่</div>
            <div className="tbl-wrap">
              <table className="tbl">
                <thead><tr><th>หมวดหมู่</th><th className="text-right">รายการ</th><th className="text-right">ยอดรวม</th><th className="text-right">สัดส่วน</th></tr></thead>
                <tbody>
                  {(data.byCategory||[]).map((c,i)=>{
                    const pct = data.grandTotal ? ((c.total_amount/data.grandTotal)*100).toFixed(1) : 0;
                    return (
                      <tr key={i}>
                        <td><strong>{c.category_name}</strong></td>
                        <td className="text-right">{fmtN(c.count)}</td>
                        <td className="text-right fw-bold" style={{color:"var(--accent)"}}>{fmt(c.total_amount)} ฿</td>
                        <td className="text-right" style={{minWidth:120}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
                            <div className="progress-track" style={{width:60}}>
                              <div className="progress-fill" style={{width:`${pct}%`,background:COLORS[(i+2)%COLORS.length]}}/>
                            </div>
                            <span style={{fontSize:11,color:"var(--text2)"}}>{pct}%</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* By Project (when showing all) */}
          {!filter.project_id && (data.byProject||[]).length > 0 && (
            <div className="card">
              <div style={{fontFamily:"'Kanit',sans-serif",fontWeight:700,fontSize:16,marginBottom:16}}>📁 สรุปตามโครงการ</div>
              <div className="tbl-wrap">
                <table className="tbl">
                  <thead><tr><th>โครงการ</th><th className="text-right">รายการ</th><th className="text-right">งบประมาณ</th><th className="text-right">ใช้ไปแล้ว</th><th className="text-right">คงเหลือ</th></tr></thead>
                  <tbody>
                    {(data.byProject||[]).map((p,i)=>(
                      <tr key={i}>
                        <td><strong>{p.project_name}</strong></td>
                        <td className="text-right">{fmtN(p.count)}</td>
                        <td className="text-right">{p.budget ? fmt(p.budget)+" ฿" : "-"}</td>
                        <td className="text-right fw-bold" style={{color:"var(--accent)"}}>{fmt(p.total_amount)} ฿</td>
                        <td className="text-right" style={{color:p.budget&&(p.budget-p.total_amount)<0?"var(--red)":"var(--green)"}}>
                          {p.budget ? fmt(p.budget-p.total_amount)+" ฿" : "-"}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  SUPPLIERS PAGE (ซัพพลายเออร์)
// ════════════════════════════════════════════════════════════════
const TAGS = ["ขนส่ง","Staff","อาหาร","เบรค/ผลไม้","เครื่องดื่ม/น้ำแข็ง","วัสดุก่อสร้าง","ช่างไฟ","ช่างเสียง","ถ่ายภาพ","ประชาสัมพันธ์","อื่นๆ"];

function SuppliersPage({ showFlash, setLoading }) {
  const [suppliers, setSuppliers] = useState([]);
  const [loc, setLoc] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [search, setSearch] = useState("");
  const [filterTag, setFilterTag] = useState("");
  const blank = { name:"", status:"บุคคลธรรมดา", tags:"", phone:"", contact_name:"", line_id:"", note:"" };
  const [form, setForm] = useState(blank);
  const [selectedTags, setSelectedTags] = useState([]);

  const load = async () => {
    setLoc(true);
    const r = await sbGet("suppliers","?order=name.asc");
    if(r.ok) setSuppliers(r.data);
    setLoc(false);
  };
  useEffect(() => { load(); }, []);

  const openAdd = () => { setForm(blank); setSelectedTags([]); setEditItem(null); setShowModal(true); };
  const openEdit = s => {
    setForm({ name:s.name, status:s.status||"บุคคลธรรมดา", tags:s.tags||"", phone:s.phone||"", contact_name:s.contact_name||"", line_id:s.line_id||"", note:s.note||"" });
    setSelectedTags(s.tags ? s.tags.split(",").filter(Boolean) : []);
    setEditItem(s); setShowModal(true);
  };

  const toggleTag = tag => {
    setSelectedTags(prev => prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]);
  };

  const save = async () => {
    if(!form.name){ showFlash("กรุณากรอกชื่อร้าน/บริษัท","err"); return; }
    setLoading(true);
    const payload = { ...form, tags: selectedTags.join(",") };
    let r;
    if(editItem) {
      r = await sbPatch("suppliers","supplier_id",editItem.supplier_id, payload);
    } else {
      r = await sbPost("suppliers",{supplier_id:uid(),...payload});
    }
    if(r.ok){ showFlash(editItem?"แก้ไขสำเร็จ ✓":"เพิ่มซัพพลายเออร์สำเร็จ ✓"); setShowModal(false); await load(); }
    else showFlash(r.error||"เกิดข้อผิดพลาด","err");
    setLoading(false);
  };

  const del = async id => {
    setLoading(true);
    const r = await sbDelete("suppliers","supplier_id",id);
    if(r.ok){ showFlash("ลบสำเร็จ"); await load(); }
    else showFlash(r.error||"ลบไม่สำเร็จ","err");
    setLoading(false); setConfirm(null);
  };

  const allTags = useMemo(() => {
    const set = new Set();
    suppliers.forEach(s => (s.tags||"").split(",").filter(Boolean).forEach(t => set.add(t)));
    return [...set];
  }, [suppliers]);

  const filtered = useMemo(() => suppliers.filter(s => {
    if(search && !`${s.name}${s.contact_name}${s.phone}${s.tags}`.toLowerCase().includes(search.toLowerCase())) return false;
    if(filterTag && !(s.tags||"").split(",").includes(filterTag)) return false;
    return true;
  }), [suppliers, search, filterTag]);

  return (
    <div className="page fade-in">
      <div className="flex-between page-header">
        <div><div className="page-title">ซัพพลายเออร์</div><div className="page-subtitle">รายชื่อร้านค้า/บริษัทที่ใช้งาน</div></div>
        <button className="btn btn-primary" onClick={openAdd}>＋ เพิ่มซัพพลายเออร์</button>
      </div>

      <div className="filter-bar">
        <input className="inp inp-sm" style={{minWidth:200}} placeholder="🔍 ค้นหาชื่อ เบอร์ ผู้ติดต่อ..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="inp inp-sm" value={filterTag} onChange={e=>setFilterTag(e.target.value)}>
          <option value="">🏷️ ทุกประเภทงาน</option>
          {allTags.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        {(search||filterTag) && <button className="btn btn-ghost btn-sm" onClick={()=>{setSearch("");setFilterTag("");}}>✕ ล้าง</button>}
      </div>

      {loc ? (
        <div style={{display:"grid",gap:12}}>{[1,2,3].map(i=><div key={i} className="skeleton" style={{height:80}}/>)}</div>
      ) : filtered.length === 0 ? (
        <div className="card empty"><div className="empty-icon">🤝</div><div>{search||filterTag ? "ไม่พบรายการที่ค้นหา" : "ยังไม่มีซัพพลายเออร์ กดปุ่ม เพิ่มซัพพลายเออร์ เพื่อเริ่มต้น"}</div></div>
      ) : (
        <div className="tbl-wrap tbl-wrap-scroll">
          <table className="tbl">
            <thead>
              <tr><th>#</th><th>ชื่อร้าน/บริษัท</th><th>ประเภท</th><th>ประเภทงาน</th><th>ผู้ติดต่อ</th><th>เบอร์โทร</th><th>Line ID</th><th>หมายเหตุ</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map((s,i) => (
                <tr key={s.supplier_id}>
                  <td style={{color:"var(--text3)",fontSize:12}}>{i+1}</td>
                  <td><strong>{s.name}</strong></td>
                  <td>
                    <span className={`badge ${s.status==="นิติบุคคล"?"badge-blue":"badge-gray"}`}>{s.status||"บุคคลธรรมดา"}</span>
                  </td>
                  <td>
                    <div className="chip-row">
                      {(s.tags||"").split(",").filter(Boolean).map(t=>(
                        <span key={t} className="badge badge-orange" style={{fontSize:10}}>{t}</span>
                      ))}
                    </div>
                  </td>
                  <td style={{fontSize:13}}>{s.contact_name||"-"}</td>
                  <td style={{fontSize:13}}>{s.phone ? <a href={`tel:${s.phone}`} style={{color:"var(--blue)"}}>{s.phone}</a> : "-"}</td>
                  <td style={{fontSize:13}}>{s.line_id||"-"}</td>
                  <td style={{fontSize:12,color:"var(--text2)",maxWidth:160}}>{s.note||"-"}</td>
                  <td>
                    <div style={{display:"flex",gap:5}}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>openEdit(s)}>✏️</button>
                      <button className="btn btn-danger btn-xs" onClick={()=>setConfirm({id:s.supplier_id,name:s.name})}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showModal && (
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal" style={{maxWidth:560}}>
            <div className="modal-title">{editItem?"✏️ แก้ไขซัพพลายเออร์":"➕ เพิ่มซัพพลายเออร์ใหม่"}</div>

            <div className="field-row">
              <div className="field" style={{gridColumn:"1/-1"}}><label>ชื่อร้าน/บริษัท *</label><input className="inp" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="เช่น ร้านวัสดุก่อสร้างไทย, บริษัท ABC จำกัด"/></div>
            </div>

            <div className="field">
              <label>ประเภท</label>
              <div style={{display:"flex",gap:10}}>
                {["บุคคลธรรมดา","นิติบุคคล"].map(s=>(
                  <button key={s} onClick={()=>setForm({...form,status:s})}
                    className={`btn btn-sm ${form.status===s?"btn-primary":"btn-ghost"}`}>{s}</button>
                ))}
              </div>
            </div>

            <div className="field">
              <label>ประเภทงาน (เลือกได้หลายอย่าง)</label>
              <div className="chip-row" style={{marginTop:6}}>
                {TAGS.map(t=>(
                  <button key={t} onClick={()=>toggleTag(t)}
                    className={`btn btn-xs ${selectedTags.includes(t)?"btn-primary":"btn-ghost"}`}>{t}</button>
                ))}
              </div>
            </div>

            <div className="field-row">
              <div className="field"><label>ชื่อผู้ติดต่อ</label><input className="inp" value={form.contact_name} onChange={e=>setForm({...form,contact_name:e.target.value})} placeholder="ชื่อ-นามสกุล"/></div>
              <div className="field"><label>เบอร์โทร</label><input className="inp" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="08x-xxx-xxxx"/></div>
            </div>

            <div className="field-row">
              <div className="field"><label>Line ID</label><input className="inp" value={form.line_id} onChange={e=>setForm({...form,line_id:e.target.value})} placeholder="@lineid"/></div>
              <div className="field"><label>หมายเหตุ</label><input className="inp" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="เช่น สั่งล่วงหน้า 3 วัน, รับเงินสดเท่านั้น"/></div>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={save} className="btn btn-primary" style={{flex:1,justifyContent:"center"}}>💾 บันทึก</button>
              <button onClick={()=>setShowModal(false)} className="btn btn-ghost">ยกเลิก</button>
            </div>
          </div>
        </div>
      )}
      {confirm && <Confirm msg={`ต้องการลบ "${confirm.name}" ใช่มั้ย?`} onOk={()=>del(confirm.id)} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}


// ════════════════════════════════════════════════════════════════
//  PRICE INQUIRY PAGE (สืบราคา)
// ════════════════════════════════════════════════════════════════
function PriceInquiryPage({ showFlash, setLoading }) {
  const [inquiries, setInquiries]   = useState([]);
  const [quotes, setQuotes]         = useState([]);
  const [tags, setTags]             = useState([]);
  const [loc, setLoc]               = useState(true);
  const [search, setSearch]         = useState("");
  const [filterTag, setFilterTag]   = useState("");

  // Inquiry modal
  const [showInqModal, setShowInqModal] = useState(false);
  const [editInq, setEditInq]           = useState(null);
  const [inqForm, setInqForm]           = useState({ item_name:"", note:"" });
  const [inqTags, setInqTags]           = useState([]);

  // Quote modal
  const [showQuoteModal, setShowQuoteModal] = useState(false);
  const [editQuote, setEditQuote]           = useState(null);
  const [activeInquiry, setActiveInquiry]   = useState(null);
  const [quoteForm, setQuoteForm]           = useState({ supplier_id:"", supplier_name:"", phone:"", description:"", price:"", unit:"", quote_date:"", file_url:"", note:"" });

  // Add tag modal
  const [showTagModal, setShowTagModal] = useState(false);
  const [newTagName, setNewTagName]     = useState("");

  // Confirm delete
  const [confirm, setConfirm] = useState(null);

  const load = async () => {
    setLoc(true);
    const [ir, qr, tr] = await Promise.all([
      sbGet("price_inquiries", "?order=created_at.desc"),
      sbGet("inquiry_quotes",  "?order=created_at.asc"),
      sbGet("inquiry_tags",    "?order=tag_name.asc"),
    ]);
    if(ir.ok) setInquiries(ir.data);
    if(qr.ok) setQuotes(qr.data);
    if(tr.ok) setTags(tr.data);
    setLoc(false);
  };
  useEffect(() => { load(); }, []);

  // ── Tags ──
  const toggleInqTag = id => setInqTags(prev => prev.includes(id) ? prev.filter(t=>t!==id) : [...prev, id]);

  const addTag = async () => {
    if(!newTagName.trim()){ showFlash("กรุณากรอกชื่อ tag","err"); return; }
    const r = await sbPost("inquiry_tags", { tag_id: uid(), tag_name: newTagName.trim() });
    if(r.ok){ showFlash("เพิ่ม tag สำเร็จ ✓"); setNewTagName(""); const tr = await sbGet("inquiry_tags","?order=tag_name.asc"); if(tr.ok) setTags(tr.data); }
    else showFlash(r.error||"เกิดข้อผิดพลาด","err");
  };

  // ── Inquiry CRUD ──
  const openAddInq = () => { setInqForm({item_name:"",note:""}); setInqTags([]); setEditInq(null); setShowInqModal(true); };
  const openEditInq = inq => {
    setInqForm({ item_name:inq.item_name, note:inq.note||"" });
    setInqTags(inq.tags ? inq.tags.split(",").filter(Boolean) : []);
    setEditInq(inq); setShowInqModal(true);
  };

  const saveInq = async () => {
    if(!inqForm.item_name.trim()){ showFlash("กรุณากรอกชื่อรายการ","err"); return; }
    setLoading(true);
    const payload = { item_name:inqForm.item_name, note:inqForm.note||"", tags:inqTags.join(",") };
    const r = editInq
      ? await sbPatch("price_inquiries","inquiry_id",editInq.inquiry_id, payload)
      : await sbPost("price_inquiries", { inquiry_id:uid(), ...payload });
    if(r.ok){ showFlash(editInq?"แก้ไขสำเร็จ ✓":"เพิ่มรายการสำเร็จ ✓"); setShowInqModal(false); await load(); }
    else showFlash(r.error||"เกิดข้อผิดพลาด","err");
    setLoading(false);
  };

  const delInq = async id => {
    setLoading(true);
    const r = await sbDelete("price_inquiries","inquiry_id",id);
    if(r.ok){ showFlash("ลบสำเร็จ"); await load(); }
    else showFlash(r.error||"ลบไม่สำเร็จ","err");
    setLoading(false); setConfirm(null);
  };

  // ── Quote CRUD ──
  const openAddQuote = inq => {
    setQuoteForm({ supplier_id:"", supplier_name:"", phone:"", description:"", price:"", unit:"", quote_date:"", file_url:"", note:"" });
    setEditQuote(null); setActiveInquiry(inq); setShowQuoteModal(true);
  };
  const openEditQuote = (q, inq) => {
    setQuoteForm({ supplier_id:q.supplier_id||"", supplier_name:q.supplier_name||"", phone:q.phone||"", description:q.description||"", price:q.price, unit:q.unit||"", quote_date:q.quote_date||"", file_url:q.file_url||"", note:q.note||"" });
    setEditQuote(q); setActiveInquiry(inq); setShowQuoteModal(true);
  };

  const saveQuote = async () => {
    if(!quoteForm.supplier_name.trim()){ showFlash("กรุณากรอกชื่อบริษัท/ร้านค้า","err"); return; }
    if(!quoteForm.price){ showFlash("กรุณากรอกราคา","err"); return; }
    setLoading(true);
    const payload = {
      inquiry_id:    activeInquiry.inquiry_id,
      supplier_name: quoteForm.supplier_name.trim(),
      phone:         quoteForm.phone||"",
      description:   quoteForm.description||"",
      price:         parseFloat(quoteForm.price)||0,
      unit:          quoteForm.unit||"",
      quote_date:    quoteForm.quote_date||null,
      file_url:      quoteForm.file_url||"",
      note:          quoteForm.note||"",
    };
    const r = editQuote
      ? await sbPatch("inquiry_quotes","quote_id",editQuote.quote_id, payload)
      : await sbPost("inquiry_quotes", { quote_id:uid(), ...payload });
    if(r.ok){ showFlash("บันทึกสำเร็จ ✓"); setShowQuoteModal(false); await load(); }
    else showFlash(r.error||"เกิดข้อผิดพลาด","err");
    setLoading(false);
  };

  const delQuote = async id => {
    setLoading(true);
    const r = await sbDelete("inquiry_quotes","quote_id",id);
    if(r.ok){ showFlash("ลบสำเร็จ"); await load(); }
    else showFlash(r.error||"ลบไม่สำเร็จ","err");
    setLoading(false); setConfirm(null);
  };

  // ── Filter ──
  const filtered = useMemo(() => inquiries.filter(inq => {
    if(search && !inq.item_name.toLowerCase().includes(search.toLowerCase())) return false;
    if(filterTag && !(inq.tags||"").split(",").includes(filterTag)) return false;
    return true;
  }), [inquiries, search, filterTag]);

  const getTagName = id => tags.find(t=>t.tag_id===id)?.tag_name || id;

  return (
    <div className="page fade-in">
      <div className="flex-between page-header">
        <div><div className="page-title">สืบราคา</div><div className="page-subtitle">เปรียบเทียบราคาจากหลายบริษัท พร้อมแนบใบเสนอราคา</div></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowTagModal(true)}>🏷️ จัดการ Tags</button>
          <button className="btn btn-primary" onClick={openAddInq}>＋ เพิ่มรายการสืบราคา</button>
        </div>
      </div>

      {/* Filter bar */}
      <div className="filter-bar">
        <input className="inp inp-sm" style={{minWidth:200}} placeholder="🔍 ค้นหารายการ..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="inp inp-sm" value={filterTag} onChange={e=>setFilterTag(e.target.value)}>
          <option value="">🏷️ ทุก Tag</option>
          {tags.map(t=><option key={t.tag_id} value={t.tag_id}>{t.tag_name}</option>)}
        </select>
        {(search||filterTag) && <button className="btn btn-ghost btn-sm" onClick={()=>{setSearch("");setFilterTag("");}}>✕ ล้าง</button>}
      </div>

      {loc ? (
        <div style={{display:"grid",gap:14}}>{[1,2].map(i=><div key={i} className="skeleton" style={{height:140}}/>)}</div>
      ) : filtered.length === 0 ? (
        <div className="card empty"><div className="empty-icon">🔍</div><div>{search||filterTag?"ไม่พบรายการที่ค้นหา":"ยังไม่มีรายการสืบราคา กดปุ่ม เพิ่มรายการสืบราคา เพื่อเริ่มต้น"}</div></div>
      ) : (
        <div style={{display:"grid",gap:18}}>
          {filtered.map(inq => {
            const inqQuotes = quotes.filter(q=>q.inquiry_id===inq.inquiry_id);
            const prices = inqQuotes.map(q=>parseFloat(q.price)||0).filter(p=>p>0);
            const minPrice = prices.length ? Math.min(...prices) : 0;
            const maxPrice = prices.length ? Math.max(...prices) : 0;
            const inqTagList = (inq.tags||"").split(",").filter(Boolean);

            return (
              <div key={inq.inquiry_id} className="card">
                {/* Header */}
                <div className="flex-between" style={{marginBottom:12}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <div style={{fontFamily:"Kanit,sans-serif",fontSize:16,fontWeight:700}}>{inq.item_name}</div>
                      {inqTagList.map(tid=>(
                        <span key={tid} className="badge badge-orange" style={{fontSize:10}}>{getTagName(tid)}</span>
                      ))}
                    </div>
                    {inq.note && <div style={{fontSize:12,color:"var(--text2)",marginTop:3}}>{inq.note}</div>}
                    {prices.length > 0 && (
                      <div style={{fontSize:12,marginTop:4}}>
                        <span style={{color:"var(--green)",fontWeight:600}}>ถูกสุด {fmt(minPrice)} ฿</span>
                        {prices.length > 1 && <span style={{color:"var(--text3)",margin:"0 6px"}}>—</span>}
                        {prices.length > 1 && <span style={{color:"var(--red)",fontWeight:600}}>แพงสุด {fmt(maxPrice)} ฿</span>}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button className="btn btn-primary btn-sm" onClick={()=>openAddQuote(inq)}>＋ เพิ่มราคา</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>openEditInq(inq)}>✏️</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>setConfirm({type:"inq",id:inq.inquiry_id,name:inq.item_name})}>🗑️</button>
                  </div>
                </div>

                {/* Quotes table */}
                {inqQuotes.length === 0 ? (
                  <div style={{textAlign:"center",padding:"12px",color:"var(--text3)",fontSize:13}}>ยังไม่มีราคา กดปุ่ม "＋ เพิ่มราคา" เพื่อเริ่มสืบราคา</div>
                ) : (
                  <div className="tbl-wrap">
                    <table className="tbl">
                      <thead>
                        <tr><th>บริษัท/ร้านค้า</th><th>เบอร์โทร</th><th>รายละเอียด</th><th className="text-right">ราคา</th><th>หน่วย</th><th>วันที่</th><th>ใบเสนอราคา</th><th>หมายเหตุ</th><th></th></tr>
                      </thead>
                      <tbody>
                        {inqQuotes.map(q => {
                          const isMin = prices.length > 1 && parseFloat(q.price) === minPrice;
                          const isMax = prices.length > 1 && parseFloat(q.price) === maxPrice;
                          return (
                            <tr key={q.quote_id}>
                              <td><strong>{q.supplier_name||"-"}</strong></td>
                              <td style={{fontSize:12}}>
                                {q.phone ? <a href={`tel:${q.phone}`} style={{color:"var(--blue)"}}>{q.phone}</a> : <span style={{color:"var(--text3)"}}>-</span>}
                              </td>
                              <td style={{fontSize:12,color:"var(--text2)",maxWidth:180}}>{q.description||"-"}</td>
                              <td className="text-right fw-bold" style={{color:isMin?"var(--green)":isMax?"var(--red)":"var(--text)"}}>
                                {fmt(q.price)} ฿
                                {isMin && <span className="badge badge-green" style={{marginLeft:6,fontSize:10}}>ถูกสุด</span>}
                                {isMax && <span className="badge badge-orange" style={{marginLeft:6,fontSize:10}}>แพงสุด</span>}
                              </td>
                              <td style={{fontSize:12,color:"var(--text2)"}}>{q.unit||"-"}</td>
                              <td style={{fontSize:12,color:"var(--text2)"}}>{q.quote_date ? thDate(q.quote_date) : "-"}</td>
                              <td>
                                {q.file_url
                                  ? <a href={q.file_url} target="_blank" rel="noreferrer" className="badge badge-blue" style={{textDecoration:"none",cursor:"pointer"}}>📄 เปิดไฟล์</a>
                                  : <span style={{color:"var(--text3)",fontSize:12}}>-</span>
                                }
                              </td>
                              <td style={{fontSize:12,color:"var(--text2)"}}>{q.note||"-"}</td>
                              <td>
                                <div style={{display:"flex",gap:4}}>
                                  <button className="btn btn-ghost btn-xs" onClick={()=>openEditQuote(q,inq)}>✏️</button>
                                  <button className="btn btn-danger btn-xs" onClick={()=>setConfirm({type:"quote",id:q.quote_id,name:q.supplier_name||"รายการนี้"})}>🗑️</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Inquiry Modal */}
      {showInqModal && (
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setShowInqModal(false)}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-title">{editInq?"✏️ แก้ไขรายการ":"➕ เพิ่มรายการสืบราคา"}</div>
            <div className="field"><label>ชื่อสินค้า/บริการ *</label><input className="inp" value={inqForm.item_name} onChange={e=>setInqForm({...inqForm,item_name:e.target.value})} placeholder="เช่น น้ำแข็งหลอดใหญ่, รถขนส่ง 4 ล้อ"/></div>
            <div className="field">
              <label>Tags</label>
              {tags.length === 0 ? (
                <div style={{fontSize:12,color:"var(--text3)"}}>ยังไม่มี tag กด "จัดการ Tags" เพื่อเพิ่ม</div>
              ) : (
                <div className="chip-row" style={{marginTop:6}}>
                  {tags.map(t=>(
                    <button key={t.tag_id} onClick={()=>toggleInqTag(t.tag_id)}
                      className={`btn btn-xs ${inqTags.includes(t.tag_id)?"btn-primary":"btn-ghost"}`}>{t.tag_name}</button>
                  ))}
                </div>
              )}
            </div>
            <div className="field"><label>หมายเหตุ</label><input className="inp" value={inqForm.note} onChange={e=>setInqForm({...inqForm,note:e.target.value})} placeholder="รายละเอียดเพิ่มเติม"/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={saveInq} className="btn btn-primary" style={{flex:1,justifyContent:"center"}}>💾 บันทึก</button>
              <button onClick={()=>setShowInqModal(false)} className="btn btn-ghost">ยกเลิก</button>
            </div>
          </div>
        </div>
      )}

      {/* Quote Modal */}
      {showQuoteModal && (
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setShowQuoteModal(false)}>
          <div className="modal" style={{maxWidth:500}}>
            <div className="modal-title">{editQuote?"✏️ แก้ไขราคา":"➕ บันทึกราคาที่สืบได้"}</div>
            {activeInquiry && <div style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>รายการ: <strong>{activeInquiry.item_name}</strong></div>}
            <div className="field">
              <label>ชื่อบริษัท/ร้านค้า *</label>
              <input className="inp" value={quoteForm.supplier_name} onChange={e=>setQuoteForm({...quoteForm,supplier_name:e.target.value})} placeholder="เช่น ร้านน้ำแข็งสมชาย, บริษัท ABC จำกัด"/>
            </div>
            <div className="field">
              <label>📞 เบอร์โทร</label>
              <input className="inp" value={quoteForm.phone} onChange={e=>setQuoteForm({...quoteForm,phone:e.target.value})} placeholder="08x-xxx-xxxx"/>
            </div>
            <div className="field">
              <label>รายละเอียดสินค้า/บริการ</label>
              <textarea className="inp" rows={2} value={quoteForm.description} onChange={e=>setQuoteForm({...quoteForm,description:e.target.value})} placeholder="เช่น น้ำแข็งหลอดใหญ่ 25 กก./ถุง, ส่งถึงสนาม, ชำระปลายทาง"/>
            </div>
            <div className="field-row">
              <div className="field"><label>ราคา (฿) *</label><input className="inp" type="number" step="0.01" value={quoteForm.price} onChange={e=>setQuoteForm({...quoteForm,price:e.target.value})} placeholder="0.00"/></div>
              <div className="field"><label>หน่วย</label><input className="inp" value={quoteForm.unit} onChange={e=>setQuoteForm({...quoteForm,unit:e.target.value})} placeholder="เช่น ต่อถุง, ต่อเที่ยว"/></div>
            </div>
            <div className="field"><label>วันที่สืบราคา</label><input className="inp" type="date" value={quoteForm.quote_date} onChange={e=>setQuoteForm({...quoteForm,quote_date:e.target.value})}/></div>
            <div className="field">
              <label>📄 Link ใบเสนอราคา (Google Drive)</label>
              <input className="inp" value={quoteForm.file_url} onChange={e=>setQuoteForm({...quoteForm,file_url:e.target.value})} placeholder="https://drive.google.com/file/d/..."/>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>วิธีรับ link: Google Drive → คลิกขวาที่ไฟล์ → Get link → Anyone with the link → Copy</div>
            </div>
            <div className="field"><label>หมายเหตุ</label><input className="inp" value={quoteForm.note} onChange={e=>setQuoteForm({...quoteForm,note:e.target.value})} placeholder="เงื่อนไข, รายละเอียดเพิ่มเติม"/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={saveQuote} className="btn btn-primary" style={{flex:1,justifyContent:"center"}}>💾 บันทึก</button>
              <button onClick={()=>setShowQuoteModal(false)} className="btn btn-ghost">ยกเลิก</button>
            </div>
          </div>
        </div>
      )}

      {/* Tag Management Modal */}
      {showTagModal && (
        <div className="modal-backdrop" onClick={e=>e.target===e.currentTarget&&setShowTagModal(false)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-title">🏷️ จัดการ Tags</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <input className="inp" value={newTagName} onChange={e=>setNewTagName(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addTag()} placeholder="ชื่อ tag ใหม่ เช่น ขนส่ง, อาหาร"/>
              <button onClick={addTag} className="btn btn-primary btn-sm" style={{whiteSpace:"nowrap"}}>＋ เพิ่ม</button>
            </div>
            <div className="chip-row">
              {tags.length === 0
                ? <div style={{color:"var(--text3)",fontSize:13}}>ยังไม่มี tag</div>
                : tags.map(t=>(
                  <div key={t.tag_id} style={{display:"flex",alignItems:"center",gap:4,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:20,padding:"3px 10px"}}>
                    <span style={{fontSize:12}}>{t.tag_name}</span>
                    <button onClick={async()=>{ await sbDelete("inquiry_tags","tag_id",t.tag_id); const tr=await sbGet("inquiry_tags","?order=tag_name.asc"); if(tr.ok) setTags(tr.data); }}
                      style={{background:"none",border:"none",cursor:"pointer",color:"var(--red)",fontSize:14,lineHeight:1,padding:"0 2px"}}>×</button>
                  </div>
                ))
              }
            </div>
            <div style={{marginTop:16}}>
              <button onClick={()=>setShowTagModal(false)} className="btn btn-ghost" style={{width:"100%",justifyContent:"center"}}>ปิด</button>
            </div>
          </div>
        </div>
      )}

      {confirm && <Confirm
        msg={confirm.type==="inq" ? `ลบรายการ "${confirm.name}" และราคาทั้งหมดใช่มั้ย?` : `ลบราคาจาก "${confirm.name}" ใช่มั้ย?`}
        onOk={()=>confirm.type==="inq" ? delInq(confirm.id) : delQuote(confirm.id)}
        onCancel={()=>setConfirm(null)}
      />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  APP ROOT
// ════════════════════════════════════════════════════════════════
const NAVS = [
  { key:"dashboard",        icon:"📊", label:"แดชบอร์ด",    section:"หลัก" },
  { key:"expenses",         icon:"💸", label:"ค่าใช้จ่าย",    section:"หลัก" },
  { key:"summary",          icon:"📈", label:"สรุปรายงาน",   section:"หลัก" },
  { key:"suppliers",        icon:"🤝", label:"ซัพพลายเออร์",  section:"หลัก" },
  { key:"price_inquiry",     icon:"🔍", label:"สืบราคา",       section:"หลัก" },
  { key:"projects",         icon:"📁", label:"โครงการ",      section:"ตั้งค่า" },
  { key:"locations",        icon:"📍", label:"สนาม/จังหวัด", section:"ตั้งค่า" },
  { key:"categories",       icon:"🗂️", label:"หมวดหมู่",     section:"ตั้งค่า" },
];

function App() {
  const [page, setPage] = useState("dashboard");
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState({ msg:"", type:"ok" });

  const showFlash = (msg, type="ok") => setToast({ msg, type });
  const clearToast = () => setToast({ msg:"", type:"ok" });

  const sections = [...new Set(NAVS.map(n=>n.section))];

  const renderPage = () => {
    const props = { showFlash, setLoading };
    switch(page) {
      case "dashboard":         return <Dashboard onNav={setPage}/>;
      case "expenses":          return <ExpensesPage {...props}/>;
      case "summary":           return <SummaryPage/>;
      case "suppliers":         return <SuppliersPage {...props}/>;
      case "price_inquiry":     return <PriceInquiryPage {...props}/>;
      case "projects":          return <ProjectsPage {...props}/>;
      case "locations":         return <LocationsPage {...props}/>;
      case "categories":        return <CategoriesPage {...props}/>;
      default:                  return <Dashboard onNav={setPage}/>;
    }
  };

  return (
    <div className="layout">
      {loading && <div className="loading-bar"/>}
      <Toast msg={toast.msg} type={toast.type} onClose={clearToast}/>

      {/* Sidebar */}
      <nav className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-logo">💰 ExpenseTrack</div>
          <div className="sidebar-sub">Project Expense System</div>
        </div>
        <div className="sidebar-nav">
          {sections.map(sec=>(
            <div key={sec}>
              <div className="sidebar-section-label">{sec}</div>
              {NAVS.filter(n=>n.section===sec).map(n=>(
                <button key={n.key} className={`nav-btn ${page===n.key?"active":""}`} onClick={()=>setPage(n.key)}>
                  <span className="icon">{n.icon}</span>
                  <span>{n.label}</span>
                </button>
              ))}
            </div>
          ))}
        </div>
        <div className="sidebar-bottom">
          <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",textAlign:"center"}}>Project Expense System v1.0</div>
        </div>
      </nav>

      {/* Main Content */}
      <main className="main">
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
